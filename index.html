        // --- Sound Generator (Web Audio API) ---
        class CyberAudioSynth {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            playBeep(freq = 440, type = 'sine', duration = 0.1, gainVal = 0.1) {
                if (this.muted) return;
                this.init();
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
                
                const osc = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                
                osc.type = type;
                osc.frequency.value = freq;
                
                gainNode.gain.setValueAtTime(gainVal, this.ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                
                osc.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }

            playClick() {
                this.playBeep(600, 'sine', 0.08, 0.08);
            }

            playSelect() {
                this.playBeep(880, 'sine', 0.15, 0.1);
                setTimeout(() => this.playBeep(1200, 'sine', 0.1, 0.1), 50);
            }

            playError() {
                this.playBeep(150, 'sawtooth', 0.3, 0.15);
                setTimeout(() => this.playBeep(120, 'sawtooth', 0.2, 0.15), 100);
            }

            playAlarm() {
                this.playBeep(880, 'triangle', 0.4, 0.2);
                setTimeout(() => this.playBeep(880, 'triangle', 0.4, 0.2), 200);
                setTimeout(() => this.playBeep(880, 'triangle', 0.4, 0.2), 400);
            }

            playWin() {
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((freq, idx) => {
                    setTimeout(() => {
                        this.playBeep(freq, 'sine', 0.35, 0.12);
                    }, idx * 120);
                });
            }
        }

                window.scrollTo({ top: 0, behavior: 'smooth' });

                setSatisfaction(prev => Math.max(0, prev + currentEffect.satisfactionEffect));
                setGlucose(prev => prev + currentEffect.glucoseEffect);
                setFreedom(prev => Math.max(0, prev + currentEffect.freedomEffect));

                if (currentScenarioIndex < activeScenarios.length - 1) {
                    setCurrentScenarioIndex(currentScenarioIndex + 1);
                } else {
                    const updated = [...selectedPumps, currentPump];
                    setSelectedPumps(updated);
                    
                    if (updated.length < 3) {
                        setGameState('selection');
                    } else {
                        audio.playWin();
                        setGameState('result');
                    }
                }
            };

                                    className="glow-button-cyan text-slate-950 font-black py-3 px-8 rounded-xl text-xs tracking-wider"
                                >
                                    {currentScenarioIndex < 1 ? 'המשך ליום הבא' : 'החלף למשאבה הבאה'}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* End of Game Resolution Screen */}
                    {gameState === 'result' && (
                        <div className="glass-panel p-8 rounded-3xl border border-cyan-500/30 shadow-2xl space-y-8 fade-in relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-cyan-500 via-rose-500 to-yellow-500"></div>
                            
                            <div className="text-center space-y-3">
                                <div className="inline-flex p-4 bg-amber-900 border border-amber-500/50 rounded-full text-amber-400 mb-2 animate-bounce">
                                    <CustomIcon name="award" className="w-12 h-12 text-amber-400" />
                                </div>
                                <h3 className="text-3xl md:text-4xl font-black text-amber-400 orbitron-font text-glow-gold">הסימולציה הושלמה בהצלחה</h3>
                                <p className="text-slate-200 text-lg font-bold">אז איך כדאי לבחור את המשאבה המתאימה ביותר עבורך?</p>
                            </div>

                            {/* Game Stats Summary */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-950 p-6 rounded-2xl border border-slate-800">
                                <div className="text-center">
                                    <span className="text-xs text-slate-400 font-bold uppercase block mb-1">סוכר בדם סופי</span>
                                    <span className="text-4xl font-black text-cyan-400 orbitron-font text-glow-cyan">{glucose} mg/dL</span>
                                    <p className="text-xs text-slate-350 mt-2 font-bold">סוכר גבוה, תסכול וניהול ידני מעייף</p>
                                </div>
                                <div className="text-center border-y md:border-y-0 md:border-x border-slate-800 py-4 md:py-0">
                                    <span className="text-xs text-slate-400 font-bold uppercase block mb-1">שביעות רצון סופית</span>
                                    <span className="text-4xl font-black text-rose-400 orbitron-font text-glow-magenta">{satisfaction}%</span>
                                    <p className="text-xs text-slate-350 mt-2 font-bold">עוגמת נפש מחסרונות לא צפויים</p>
                                </div>
                                <div className="text-center">
                                    <span className="text-xs text-slate-400 font-bold uppercase block mb-1">מדד חופש סופי</span>
                                    <span className="text-4xl font-black text-amber-400 orbitron-font text-glow-gold">{freedom}%</span>
                                    <p className="text-xs text-slate-350 mt-2 font-bold">הגבלות בטיולים, שחייה ובפעילויות</p>
                                </div>
                            </div>

                            {/* The Lesson */}
                            <div className="space-y-4 max-w-2xl mx-auto text-center bg-slate-950/80 border border-slate-850 p-6 rounded-2xl">
                                <h4 className="text-xl md:text-2xl font-black text-slate-100">מסקנת הניסוי: אין משאבה מושלמת לכולם!</h4>
                                <p className="text-slate-300 leading-relaxed text-sm font-semibold">
                                    לכל משאבה יש פרמטרים ותכונות שיכולות להשפיע על נוחות המשתמש. ובסוף <strong className="text-cyan-400">יש לבצע התאמה אישית מדוייקת לסגנון החיים ולהעדפות שלך!</strong>
                                </p>
                            </div>

                            <div className="flex justify-center pt-4">
                                <button 
                                    onClick={handleStartGame} 
                                    className="glow-button-cyan text-slate-950 font-black py-4 px-12 rounded-full text-sm tracking-wider shadow-lg"
                                >
                                    שחק בסימולטור מחדש ↺
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Wizard (PumpSelector) Component ---
        function Wizard({ setView }) {
            const [step, setStep] = useState(0);
            const [phoneModel, setPhoneModel] = useState('');
            const [compatiblePumps, setCompatiblePumps] = useState([]);
            
            // Filters
            const [age, setAge] = useState('');
            const [mustHebrew, setMustHebrew] = useState(null);
            const [wantsWaterproof, setWantsWaterproof] = useState(null);
            const [wantsAppControl, setWantsAppControl] = useState(null);
            const [needsSplitBolus, setNeedsSplitBolus] = useState(null);
            
            // Output state
            const [calculatedResults, setCalculatedResults] = useState([]);

            const handleCalculate = () => {
                audio.playSelect();
                
                const scores = pumpsData.map(pump => {
                    let score = 100;
                    let reasons = [];
                    let warning = null;

                    if (age) {
                        const parsedAge = parseInt(age);
                        if (parsedAge < pump.minAge) {
                            score -= 40;
                            reasons.push(`המשאבה מאושרת מגיל ${pump.minAge} (גיל שהוזן: ${parsedAge})`);
                            warning = `גיל המטופל נמוך מהגיל המאושר לשימוש במשאבה זו.`;
                        }
                    }

                    if (mustHebrew === true && !pump.hasHebrew) {
                        score -= 30;
                        reasons.push("ממשק המשאבה באנגלית בלבד (נדרש ממשק בעברית)");
                    } else if (mustHebrew === true && pump.hasHebrew) {
                        reasons.push("ממשק מלא בעברית (מותאם לדרישה)");
                    }

                    if (wantsWaterproof === true) {
                        if (pump.id === 'omnipod') {
                            reasons.push("עמידה מלאה במים (מתאימה לשחייה ללא ניתוק)");
                        } else {
                            score -= 20;
                            reasons.push("אינה עמידה למים בשחייה (חובה לנתק)");
                        }
                    }

                    if (wantsAppControl === true) {
                        if (pump.hasAppControl) {
                            reasons.push("תומכת בשליטה ומתן בולוס ישירות מהנייד");
                        } else {
                            score -= 25;
                            reasons.push("אין אפשרות למתן בולוס או שליטה מלאה מהנייד");
                        }
                    }

                    if (needsSplitBolus === true) {
                        if (pump.hasSplitBolus) {
                            reasons.push("תומכת בבולוס מפוצל במצב אוטומטי (אידיאלי לפיצה/שומנים)");
                        } else {
                            score -= 20;
                            reasons.push("אינה תומכת בבולוס מפוצל במצב אוטומטי");
                        }
                    }

                    if (phoneModel && phoneModel !== 'מכשיר אחר / לא מופיע ברשימה') {
                        const isAll = pump.supportedDevices.includes('all');
                        const isMatch = pump.supportedDevices.some(device => 
                            phoneModel.toLowerCase().includes(device.toLowerCase())
                        );

                        if (!isAll && !isMatch) {
                            score -= 35;
                            reasons.push(`המכשיר הנייד (${phoneModel}) אינו מופיע ברשימת התמיכה הרשמית של המשאבה`);
                        } else {
                            reasons.push("המכשיר הנייד תואם ומאושר לשימוש");
                        }
                    }

                    return {
                        ...pump,
                        score: Math.max(0, score),
                        reasons,
                        warning
                    };
                }).sort((a, b) => b.score - a.score);

                setCalculatedResults(scores);
                setStep(6);
            };

            const resetWizard = () => {
                audio.playClick();
                setStep(0);
                setPhoneModel('');
                setAge('');
                setMustHebrew(null);
                setWantsWaterproof(null);
                setWantsAppControl(null);
                setNeedsSplitBolus(null);
                setCalculatedResults([]);
            };

            return (
                <div className="fade-in max-w-3xl mx-auto glass-panel p-8 rounded-3xl border border-cyan-500/30 shadow-2xl relative">
                    <div className="absolute top-0 left-0 w-full h-1 bg-cyan-400"></div>

                    {/* Step 0: Phone Selection */}
                    {step === 0 && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold text-slate-100">שלב 1: אימות תאימות מכשיר נייד</h3>
                            <p className="text-slate-350 text-sm font-semibold">התמיכה באפליקציה ושליטה מהנייד משתנה משמעותית בין היצרנים. בחר/י את דגם הטלפון שברשותך:</p>
                            
                            <div className="grid grid-cols-1 gap-3 max-h-96 overflow-y-auto pr-2 bg-slate-950 p-4 rounded-xl border border-slate-800">
                                {popularPhones.map((phone, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => { audio.playClick(); setPhoneModel(phone); setStep(1); }}
                                        className={`w-full text-right p-3 rounded-lg border text-sm transition-all duration-300 ${
                                            phoneModel === phone 
                                                ? 'bg-cyan-950 border-cyan-400 text-cyan-400 font-bold' 
                                                : 'border-slate-800 hover:border-cyan-500/30 bg-slate-900 text-slate-300 font-medium'
                                        }`}
                                    >
                                        {phone}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Step 1: Age */}
                    {step === 1 && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold text-slate-100">שלב 2: גיל המטופל</h3>
                            <p className="text-slate-350 text-sm font-semibold">לחלק מהמשאבות יש מגבלת גיל מינימלית מאושרת על ידי ה-FDA ומשרד הבריאות.</p>
                            
                            <input 
                                type="number" 
                                value={age}
                                onChange={(e) => setAge(e.target.value)}
                                placeholder="הזן גיל בשנים (לדוגמה: 12)"
                                className="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl text-lg text-slate-100 focus:outline-none focus:border-cyan-400 text-center font-bold orbitron-font"
                            />

                            <div className="flex justify-end gap-3 pt-4">
                                <button onClick={() => { audio.playClick(); setStep(0); }} className="bg-slate-900 hover:bg-slate-800 text-slate-300 px-6 py-2.5 rounded-xl border border-slate-800 text-sm font-bold">חזור</button>
                                <button 
                                    onClick={() => { if(age) { audio.playClick(); setStep(2); } }} 
                                    className="glow-button-cyan text-slate-950 font-black px-6 py-2.5 rounded-xl text-sm"
                                    disabled={!age}
                                >
                                    המשך
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Step 2: Language */}
                    {step === 2 && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold text-slate-100">שלב 3: שפת ממשק</h3>
                            <p className="text-slate-300 text-sm font-semibold">האם למשתמש חובה לקבל ממשק מלא בעברית, או שהוא יכול להסתדר עם אנגלית טכנית בסיסית?</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <button 
                                    onClick={() => { audio.playClick(); setMustHebrew(true); setStep(3); }}
                                    className="p-6 rounded-2xl border border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20 text-center transition-all"
                                >
                                    <h4 className="font-bold text-lg text-slate-200">כן, חובה עברית</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">לא מסתדר בכלל עם אנגלית</p>
                                </button>
                                <button 
                                    onClick={() => { audio.playClick(); setMustHebrew(false); setStep(3); }}
                                    className="p-6 rounded-2xl border border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20 text-center transition-all"
                                >
                                    <h4 className="font-bold text-lg text-slate-200">לא חובה, אנגלית זה בסדר</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">מסתדר/ת עם אנגלית בסיסית</p>
                                </button>
                            </div>

                            <div className="flex justify-start">
                                <button onClick={() => { audio.playClick(); setStep(1); }} className="bg-slate-900 hover:bg-slate-800 text-slate-300 px-6 py-2.5 rounded-xl border border-slate-800 text-sm font-bold">חזור</button>
                            </div>
                        </div>
                    )}

                    {/* Step 3: Swimming */}
                    {step === 3 && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold text-slate-100">שלב 4: פעילות במים ושחייה</h3>
                            <p className="text-slate-300 text-sm font-semibold">האם את/ה שוחה באופן קבוע או עוסק/ת בספורט מים שבו חשוב שהמשאבה תישאר מחוברת ותהיה עמידה למים?</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <button 
                                    onClick={() => { audio.playClick(); setWantsWaterproof(true); setStep(4); }}
                                    className="p-6 rounded-2xl border border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20 text-center transition-all"
                                >
                                    <h4 className="font-bold text-lg text-slate-200">כן, השחייה משמעותית בשגרת חיי</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">חשוב לי רצף טיפולי ועמידות במים</p>
                                </button>
                                <button 
                                    onClick={() => { audio.playClick(); setWantsWaterproof(false); setStep(4); }}
                                    className="p-6 rounded-2xl border border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20 text-center transition-all"
                                >
                                    <h4 className="font-bold text-lg text-slate-200">לא קריטי / לא שוחה</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">מנתק/ת את המשאבה בזמן מקלחת וזה מספיק</p>
                                </button>
                            </div>

                            <div className="flex justify-start">
                                <button onClick={() => { audio.playClick(); setStep(2); }} className="bg-slate-900 hover:bg-slate-800 text-slate-300 px-6 py-2.5 rounded-xl border border-slate-800 text-sm font-bold">חזור</button>
                            </div>
                        </div>
                    )}

                    {/* Step 4: App Control */}
                    {step === 4 && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold text-slate-100">שלב 5: שליטה מהטלפון הנייד</h3>
                            <p className="text-slate-350 text-sm font-semibold">האם חשוב לך לתת אינסולין (בולוס ארוחה) ולבצע התאמות ישירות מהטלפון הנייד מבלי להוציא את המשאבה מהבגדים?</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <button 
                                    onClick={() => { audio.playClick(); setWantsAppControl(true); setStep(5); }}
                                    className="p-6 rounded-2xl border border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20 text-center transition-all"
                                >
                                    <h4 className="font-bold text-lg text-slate-200 font-bold">כן, קריטי לי לשלוט מהנייד</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">דיסקרטיות מקסימלית בניהול בולוסים</p>
                                </button>
                                <button 
                                    onClick={() => { audio.playClick(); setWantsAppControl(false); setStep(5); }}
                                    className="p-6 rounded-2xl border border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20 text-center transition-all"
                                >
                                    <h4 className="font-bold text-lg text-slate-200 font-bold">לא חובה שליטה מהנייד</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">אין לי בעיה ללחוץ על המכשיר עצמו</p>
                                </button>
                            </div>

                            <div className="flex justify-start">
                                <button onClick={() => { audio.playClick(); setStep(3); }} className="bg-slate-900 hover:bg-slate-800 text-slate-300 px-6 py-2.5 rounded-xl border border-slate-800 text-sm font-bold">חזור</button>
                            </div>
                        </div>
                    )}

                    {/* Step 5: Split Bolus */}
                    {step === 5 && (
                        <div className="space-y-6">
                            <h3 className="text-2xl font-bold text-slate-100">שלב 6: ארוחות מורכבות (בולוס מפוצל)</h3>
                            <p className="text-slate-350 text-sm font-semibold">האם הארוחות שלך כוללות לעיתים קרובות מאכלים שומניים כגון פיצה, פסטה בשמנת או בשרים המצריכים מתן אינסולין מפוצל (חלוקת המנה לשני שלבים)?</p>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <button 
                                    onClick={() => { audio.playClick(); setNeedsSplitBolus(true); }}
                                    className={`p-6 rounded-2xl border text-center transition-all ${
                                        needsSplitBolus === true 
                                            ? 'bg-cyan-950 border-cyan-400 text-cyan-400' 
                                            : 'border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20'
                                    }`}
                                >
                                    <h4 className="font-bold text-lg text-slate-200 font-bold">כן, אני צריך/ה בולוס מפוצל</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">מתמודד/ת עם השפעה מאוחרת של שומנים/חלבונים</p>
                                </button>
                                <button 
                                    onClick={() => { audio.playClick(); setNeedsSplitBolus(false); }}
                                    className={`p-6 rounded-2xl border text-center transition-all ${
                                        needsSplitBolus === false 
                                            ? 'bg-cyan-950 border-cyan-400 text-cyan-400' 
                                            : 'border-slate-800 bg-slate-900 hover:border-cyan-500/50 hover:bg-cyan-950/20'
                                    }`}
                                >
                                    <h4 className="font-bold text-lg text-slate-200 font-bold">לא חובה בולוס מפוצל</h4>
                                    <p className="text-xs text-slate-400 mt-2 font-medium">אוכל/ת ארוחות רגילות לרוב</p>
                                </button>
                            </div>

                            <div className="flex justify-between items-center pt-4">
                                <button onClick={() => { audio.playClick(); setStep(4); }} className="bg-slate-900 hover:bg-slate-800 text-slate-300 px-6 py-2.5 rounded-xl border border-slate-800 text-sm font-bold">חזור</button>
                                <button 
                                    onClick={handleCalculate}
                                    className="glow-button-cyan text-slate-950 font-black px-8 py-3 rounded-xl text-sm"
                                    disabled={needsSplitBolus === null}
                                >
                                    הצג תוצאות התאמה
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Step 6: Results Screen */}
                    {step === 6 && (
                        <div className="space-y-8 fade-in">
                            <div className="text-center">
                                <h3 className="text-3xl font-black text-glow-cyan text-cyan-400">תוצאות התאמת משאבות אינסולין</h3>
                                <p className="text-slate-350 text-sm font-bold mt-1">מערכת סינון המכשירים שקללה את ההעדפות שלך:</p>
                            </div>

                            <div className="space-y-6">
                                {calculatedResults.map(result => (
                                    <div key={result.id} className="glass-panel p-6 rounded-2xl border border-slate-800 flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
                                        <div className="space-y-3 flex-grow">
                                            <div className="flex items-center gap-3">
                                                <h4 className="text-2xl font-black text-slate-100">{result.name}</h4>
                                                <span className="text-[10px] bg-cyan-950 border border-cyan-500/30 text-cyan-400 font-bold px-2 py-0.5 rounded uppercase orbitron-font">{result.type === 'tube' ? 'צינורית' : 'פוד/אלחוטי'}</span>
                                            </div>
                                            
                                            <p className="text-xs text-slate-300 leading-relaxed max-w-xl font-medium">{result.description}</p>
                                            
                                            {result.warning && (
                                                <div className="text-rose-450 text-xs font-bold flex items-center gap-1">
                                                    <CustomIcon name="alert" className="w-4 h-4" />
                                                    <span>{result.warning}</span>
                                                </div>
                                            )}

                                            <div className="space-y-1">
                                                <span className="text-xs text-slate-400 font-bold block mb-1">ניתוח התאמה:</span>
                                                {result.reasons.map((reason, rIdx) => (
                                                    <div key={rIdx} className="text-xs text-slate-300 flex items-center gap-2 font-medium">
                                                        <CustomIcon name="check" className="w-3.5 h-3.5 text-cyan-400" />
                                                        <span>{reason}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Match Score Display */}
                                        <div className="text-center md:border-r border-slate-800 md:pr-8 shrink-0 w-full md:w-auto">
                                            <span className="text-xs text-slate-400 font-bold block mb-1">ציון התאמה</span>
                                            <span className="text-5xl font-black orbitron-font text-glow-cyan text-cyan-400">{result.score}%</span>
                                            
                                            <a 
                                                href={result.website} 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                className="mt-4 flex items-center justify-center gap-1 bg-slate-900 border border-slate-800 hover:border-cyan-500/50 text-slate-300 hover:text-cyan-400 py-2 px-4 rounded-xl text-xs font-bold transition-all"
                                            >
                                                <span>לאתר היצרן</span>
                                                <CustomIcon name="externalLink" className="w-3.5 h-3.5" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="flex justify-center pt-4">
                                <button 
                                    onClick={resetWizard} 
                                    className="bg-slate-900 hover:bg-slate-800 text-slate-300 border border-slate-700 font-bold py-3.5 px-8 rounded-full text-sm transition-all"
                                >
                                    התחל שאלון חדש
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Carb Quiz Component ---
        function CarbQuiz({ setView }) {
            const [selectedQuizIndex, setSelectedQuizIndex] = useState(null);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);
            const [shuffledOptions, setShuffledOptions] = useState([]);
            const [correctIndex, setCorrectIndex] = useState(null);

            const activeQuestions = selectedQuizIndex !== null ? carbQuizzes[selectedQuizIndex] : [];
            const currentQ = activeQuestions[currentQIndex];

            useEffect(() => {
                if (!currentQ) return;
                const originalOptions = currentQ.options;
                const originalCorrectText = originalOptions[currentQ.correct];
                const shuffled = [...originalOptions];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                setShuffledOptions(shuffled);
                setCorrectIndex(shuffled.indexOf(originalCorrectText));
            }, [currentQIndex, currentQ]);

            const handleOptionClick = (idx) => {
                if (showFeedback) return; 
                setSelectedOption(idx);
                setShowFeedback(true);
                if (idx === correctIndex) {
                    audio.playSelect();
                    setScore(score + 1);
                } else {
                    audio.playError();
                }
            };

            const handleNext = () => {
                audio.playClick();
                if (currentQIndex < activeQuestions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                    setSelectedOption(null);
                    setShowFeedback(false);
                } else {
                    audio.playWin();
                    setIsFinished(true);
                }
            };

            const resetQuiz = () => {
                audio.playClick();
                setSelectedQuizIndex(null);
                setCurrentQIndex(0);
                setSelectedOption(null);
                setShowFeedback(false);
                setScore(0);
                setIsFinished(false);
            };

            if (selectedQuizIndex === null) {
                return (
                    <div className="fade-in max-w-4xl mx-auto text-right space-y-8">
                        <div className="text-center mb-10">
                            <div className="inline-flex p-4 bg-amber-950/60 border border-amber-500/50 rounded-full text-amber-400 mb-2">
                                <CustomIcon name="utensils" className="w-12 h-12" />
                            </div>
                            <h2 className="text-3xl font-black text-glow-gold text-amber-400">תרגול ספירת פחמימות</h2>
                            <p className="text-slate-350 text-sm font-bold mt-1">איזון הסוכר מתחיל בהבנה מדויקת של המזון. בחרי שאלון תרגול כדי להתחיל:</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <button onClick={() => { audio.playSelect(); setSelectedQuizIndex(0); }} className="glass-panel p-8 rounded-2xl border border-slate-800 hover:border-amber-500/50 text-center transition-all duration-300 hover:shadow-[0_0_20px_rgba(245,158,11,0.2)] group">
                                <h3 className="text-xl font-bold text-slate-100 group-hover:text-amber-400 mb-2">שאלון 1: יסודות</h3>
                                <p className="text-xs text-slate-400 font-medium">10 שאלות בסיסיות בהערכת מנות פחמימה</p>
                            </button>
                            <button onClick={() => { audio.playSelect(); setSelectedQuizIndex(1); }} className="glass-panel p-8 rounded-2xl border border-slate-800 hover:border-amber-500/50 text-center transition-all duration-300 hover:shadow-[0_0_20px_rgba(245,158,11,0.2)] group">
                                <h3 className="text-xl font-bold text-slate-100 group-hover:text-amber-400 mb-2">שאלון 2: למתקדמים</h3>
                                <p className="text-xs text-slate-400 font-medium">10 שאלות התעמקות ושילוב שומנים/אלכוהול</p>
                            </button>
                            <button onClick={() => { audio.playSelect(); setSelectedQuizIndex(2); }} className="glass-panel p-8 rounded-2xl border border-slate-800 hover:border-amber-500/50 text-center transition-all duration-300 hover:shadow-[0_0_20px_rgba(245,158,11,0.2)] group">
                                <h3 className="text-xl font-bold text-slate-100 group-hover:text-amber-400 mb-2">שאלון 3: ארוחות מורכבות</h3>
                                <p className="text-xs text-slate-400 font-medium">10 שאלות תרגול על מנות מורכבות ומסעדות</p>
                            </button>
                        </div>
                    </div>
                );
            }

            if (isFinished) {
                const percentage = Math.round((score / activeQuestions.length) * 100);
                return (
                    <div className="fade-in max-w-2xl mx-auto glass-panel p-8 rounded-3xl border border-amber-500/30 text-center space-y-6">
                        <div className="w-20 h-20 bg-amber-950/60 border border-amber-500/50 rounded-full flex items-center justify-center mx-auto text-amber-400">
                            <CustomIcon name="award" className="w-10 h-10" />
                        </div>
                        <h2 className="text-3xl font-black text-glow-gold text-amber-400">סיכום התרגול</h2>
                        <div className="text-6xl font-black orbitron-font text-slate-100">{percentage}%</div>
                        <p className="text-slate-200 text-sm font-bold">ענית נכונה על {score} מתוך {activeQuestions.length} שאלות בשאלון {selectedQuizIndex + 1}.</p>
                        
                        <div className="flex justify-center gap-4 pt-4">
                            <button onClick={resetQuiz} className="glow-button-magenta text-slate-100 font-bold py-3 px-8 rounded-full text-xs">חזור לרשימת השאלונים</button>
                            <button onClick={() => { audio.playClick(); setView('game'); }} className="bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-300 py-3 px-8 rounded-full text-xs transition-all">חזור לסימולטור</button>
                        </div>
                    </div>
                );
            }

            const progress = (currentQIndex / activeQuestions.length) * 100;

            return (
                <div className="fade-in max-w-3xl mx-auto glass-panel p-8 rounded-3xl border border-amber-500/30 text-right space-y-6">
                    <div className="flex justify-between items-center text-xs text-slate-400 font-bold uppercase orbitron-font">
                        <span>שאלה {currentQIndex + 1} מתוך {activeQuestions.length} • שאלון {selectedQuizIndex + 1}</span>
                        <span>{Math.round(progress)}% הושלמו</span>
                    </div>

                    <div className="w-full bg-slate-900 h-2 rounded-full overflow-hidden border border-slate-800">
                        <div className="bg-amber-400 h-full bar-transition" style={{ width: `${progress}%` }}></div>
                    </div>

                    <div className="flex gap-3 items-start pt-2">
                        <div className="text-amber-400 mt-1"><CustomIcon name="utensils" className="w-6 h-6" /></div>
                        <h3 className="text-xl md:text-2xl font-bold text-slate-100 leading-snug">{currentQ.q}</h3>
                    </div>

                    <div className="grid grid-cols-1 gap-3 pt-4">
                        {shuffledOptions.map((opt, idx) => {
                            let btnClass = "w-full text-right p-4 rounded-xl border transition-all text-sm flex justify-between items-center ";
                            let icon = null;
                            
                            if (!showFeedback) {
                                btnClass += "border-slate-800 bg-slate-900 hover:border-amber-500/50 text-slate-200 font-semibold cursor-pointer";
                            } else {
                                if (idx === correctIndex) {
                                    btnClass += "border-emerald-500 bg-emerald-950 text-emerald-400 font-bold";
                                    icon = <CustomIcon name="check" className="w-5 h-5 text-emerald-400" />;
                                } else if (selectedOption === idx) {
                                    btnClass += "border-rose-500 bg-rose-950 text-rose-400 font-bold";
                                    icon = <CustomIcon name="xCircle" className="w-5 h-5 text-rose-400" />;
                                } else {
                                    btnClass += "border-slate-900 bg-slate-950 text-slate-650 cursor-not-allowed opacity-40";
                                }
                            }
                            return (
                                <button key={idx} onClick={() => handleOptionClick(idx)} disabled={showFeedback} className={btnClass}>
                                    <span>{opt}</span>
                                    {icon}
                                </button>
                            );
                        })}
                    </div>

                    {showFeedback && (
                        <div className="fade-in p-5 rounded-xl border bg-slate-900 border-slate-800 space-y-2">
                            <h5 className="text-amber-400 font-bold text-sm">הסבר והרחבה:</h5>
                            <p className="text-xs text-slate-200 leading-relaxed font-semibold">{currentQ.exp}</p>
                        </div>
                    )}

                    {showFeedback && (
                        <div className="flex justify-end pt-4">
                            <button onClick={handleNext} className="glow-button-magenta text-slate-100 font-bold py-2.5 px-6 rounded-xl text-xs flex items-center gap-1">
                                <span>{currentQIndex < activeQuestions.length - 1 ? 'לשאלה הבאה' : 'סיים תרגול'}</span>
                                <CustomIcon name="chevronLeft" className="w-4 h-4" />
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // --- Comparison Component ---
        function Comparison() {
            return (
                <div className="fade-in space-y-8">
                    <div className="text-center">
                        <h3 className="text-3xl font-black text-glow-cyan text-cyan-400">טבלת השוואה טכנית מורחבת</h3>
                        <p className="text-slate-350 text-sm font-semibold mt-1">השוואה מפורטת ומבוססת נתונים רשמיים של משאבות האינסולין ההיברידיות בישראל</p>
                    </div>

                    <div className="overflow-x-auto glass-panel rounded-2xl border border-slate-800">
                        <table className="w-full text-right border-collapse">
                            <thead>
                                <tr className="border-b border-slate-800 bg-slate-900 text-xs font-bold text-cyan-400 uppercase tracking-wider">
                                    <th className="p-4">מאפיין</th>
                                    <th className="p-4">MiniMed 780G</th>
                                    <th className="p-4">Tandem t:slim X2</th>
                                    <th className="p-4">Omnipod 5</th>
                                </tr>
                            </thead>
                            <tbody className="text-xs text-slate-300 divide-y divide-slate-900 font-medium">
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">סוג חיבור לגוף</td>
                                    <td className="p-4">צינורית פיזית</td>
                                    <td className="p-4">צינורית פיזית</td>
                                    <td className="p-4 text-emerald-450 font-bold">ללא צינורית (פוד אלחוטי)</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">שליטה ומתן בולוס מהנייד</td>
                                    <td className="p-4 text-rose-450 font-bold">לא (צפייה בנתונים בלבד)</td>
                                    <td className="p-4 text-emerald-450 font-bold">כן (באמצעות אפליקציה)</td>
                                    <td className="p-4 text-emerald-450 font-bold">כן (באמצעות אפליקציה/שלט PDM)</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">עמידות במים ושחייה</td>
                                    <td className="p-4 text-amber-400">עמיד במים (נתזים בלבד, לא לשחייה)</td>
                                    <td className="p-4 text-rose-500 font-bold">לא עמידה (חובה לנתק)</td>
                                    <td className="p-4 text-emerald-400 font-bold">עמידה מלאה (מתאימה לשחייה)</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">שפת ממשק המכשיר</td>
                                    <td className="p-4 text-emerald-500 font-bold">עברית מלאה</td>
                                    <td className="p-4 text-rose-500 font-bold">אנגלית בלבד</td>
                                    <td className="p-4 text-rose-500 font-bold">אנגלית בלבד</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">סוג סוללה</td>
                                    <td className="p-4 text-emerald-500 font-bold">סוללת AA רגילה (להחלפה מהירה)</td>
                                    <td className="p-4 text-amber-400">סוללה נטענת מובנית (דורש כבל)</td>
                                    <td className="p-4 text-amber-400">סוללה נטענת בשלט (פוד מוחלף)</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">בולוס מפוצל במצב אוטומטי</td>
                                    <td className="p-4 text-rose-450 font-bold">לא נתמך</td>
                                    <td className="p-4 text-emerald-500 font-bold">כן נתמך (ייחודי לטנדם)</td>
                                    <td className="p-4 text-rose-450 font-bold">לא נתמך</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">גיל מינימלי מאושר</td>
                                    <td className="p-4 font-bold">גיל 7 ומעלה</td>
                                    <td className="p-4 font-bold">גיל 6 ומעלה</td>
                                    <td className="p-4 font-bold text-emerald-500">גיל 2 ומעלה</td>
                                </tr>
                                <tr>
                                    <td className="p-4 font-bold text-slate-200">סנסור מתממשק</td>
                                    <td className="p-4">Simplera / Guardian 4</td>
                                    <td className="p-4">Dexcom G6 / G7</td>
                                    <td className="p-4">Dexcom G6 / G7</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
                        <h4 className="text-lg font-bold text-slate-100">סקירת חיישנים (Sensors) נפוצים</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {sensorsData.map((sensor, idx) => (
                                <div key={idx} className="bg-slate-950 p-4 rounded-xl border border-slate-900 space-y-2">
                                    <h5 className="font-bold text-cyan-400 text-sm">{sensor.name}</h5>
                                    <p className="text-xs text-slate-200 font-semibold">כיול: {sensor.calibration}</p>
                                    <p className="text-xs text-slate-200 font-semibold">משך פעילות: {sensor.duration}</p>
                                    <p className="text-[11px] text-slate-350 leading-relaxed font-semibold">{sensor.notes}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- Info Component ---
        function Info() {
            return (
                <div className="fade-in max-w-4xl mx-auto space-y-8 text-right">
                    <div className="text-center">
                        <h3 className="text-3xl font-black text-glow-cyan text-cyan-400">זכאות וסל הבריאות</h3>
                        <p className="text-slate-350 text-sm font-semibold mt-1">מידע רשמי על זכאות למשאבות אינסולין וסנסורים במדינת ישראל</p>
                    </div>

                    <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
                        <h4 className="text-xl font-bold text-slate-100 border-b border-slate-800 pb-2">קריטריונים לקבלת משאבה בסל הבריאות</h4>
                        <p className="text-xs text-slate-250 leading-relaxed font-semibold">
                            משאבת אינסולין ומערכת היברידית במעגל סגור כלולות בסל הבריאות הממלכתי בישראל עבור חולי סוכרת סוג 1 (סוכרת נעורים) בהתקיים אחד מהתנאים הבאים:
                        </p>
                        <ul className="list-disc list-inside text-xs text-slate-300 space-y-2 pr-4 leading-relaxed font-medium">
                            <li>מטופלים שאינם מאוזנים (HbA1c מעל 7.5% או בהתאם להנחיות הרופא המטפל) תחת טיפול זריקות מרובות.</li>
                            <li>אירועים חוזרים של היפוגליקמיה קשה או חוסר מודעות להיפוגליקמיה.</li>
                            <li>תנודתיות רבה וקיצונית ברמות הסוכר לאורך היממה.</li>
                            <li>נשים עם סוכרת סוג 1 המתכננות הריון או במהלך הריון.</li>
                        </ul>
                    </div>

                    <div className="glass-panel p-6 rounded-2xl border border-slate-800 space-y-4">
                        <h4 className="text-xl font-bold text-slate-100 border-b border-slate-800 pb-2">הליך הגשת הבקשה</h4>
                        <p className="text-xs text-slate-250 leading-relaxed font-semibold">
                            הבקשה לאישור המשאבה מוגשת על ידי צוות מרפאת הסוכרת המטפלת (הרופא/ה האנדוקרינולוג/ית והאח/ות המומחה/ית) לוועדה הרפואית של קופת החולים שלך. מומלץ להצטייד בדוחות מעקב סנסור (LibreView / Dexcom Clarity) המעידים על הצורך הטכנולוגי.
                        </p>
                    </div>
                </div>
            );
        }

        // --- About Component ---
        function About() {
            return (
                <div className="fade-in max-w-3xl mx-auto space-y-8 text-right">
                    <div className="text-center">
                        <h3 className="text-3xl font-black text-glow-cyan text-cyan-400">מי אנחנו</h3>
                        <p className="text-slate-350 text-sm font-semibold mt-1">אודות המיזם והמטרות מאחורי פיתוח הפלטפורמה</p>
                    </div>

                    <div className="glass-panel p-8 rounded-3xl border border-slate-800 space-y-6">
                        <p className="text-sm text-slate-200 leading-relaxed font-semibold">
                            פרויקט <strong>PumpSelector IL</strong> נולד מתוך ההבנה ששוק הטכנולוגיה הרפואית לסוכרת סוג 1 מציע כיום פתרונות מדהימים - אך לכל אחד מהם חסרונות ומגבלות ייחודיים שמשפיעים דרמטית על אורח החיים של המטופל.
                        </p>
                        
                        <p className="text-sm text-slate-200 leading-relaxed font-semibold">
                            מטרת האתר היא להנגיש את המידע הטכני והקליני בצורה חווייתית ואינטראקטיבית, ולאפשר למטופלים ולצוותים הרפואיים לבצע התאמה מושכלת ומבוססת נתונים של המכשיר הרפואי שילווה אותם 24/7.
                        </p>

                        <div className="border-t border-slate-850 pt-6">
                            <h5 className="font-bold text-cyan-400 text-sm mb-2">צור קשר ומשוב</h5>
                            <p className="text-xs text-slate-400 leading-relaxed font-medium">
                                נשמח לשמוע הצעות לשיפור, תיקוני נתונים או משובים על המשחק והמחשבון. ניתן לפנות אלינו באמצעות טופס המשוב המהיר המופיע באתר.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Render React App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
